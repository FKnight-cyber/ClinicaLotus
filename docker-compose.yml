services:
  postgres:
    image: postgres:16-alpine
    container_name: clinica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: clinica
      POSTGRES_USER: clinica
      POSTGRES_PASSWORD: clinica_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinica -d clinica"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: clinica-api
    restart: unless-stopped
    command: sh -c "npm install && cd apps/api && rm -rf dist tsconfig.tsbuildinfo && npx prisma generate && npx prisma db push && npm run prisma:seed && npm run start:dev"
    environment:
      API_PORT: 3333
      DATABASE_URL: postgresql://clinica:clinica_dev@postgres:5432/clinica
      JWT_SECRET: clinica_dev_secret_change_me
      ADMIN_PASSWORD: admin123
      WEB_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      TSC_WATCHFILE: UseFsEventsWithFallbackDynamicPolling
      TSC_WATCHDIRECTORY: RecursiveDirectoryUsingDynamicPriorityPolling
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/workspace
      - api_node_modules:/workspace/node_modules

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: clinica-web
    restart: unless-stopped
    command: sh -c "npm install && cd apps/web && npx next dev --hostname 0.0.0.0"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3333
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: 1000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - .:/workspace
      - web_node_modules:/workspace/node_modules
      - web_next:/workspace/apps/web/.next

volumes:
  postgres_data:
  api_node_modules:
  web_node_modules:
  web_next: